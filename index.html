<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <title>MyDictation - TOEIC 440</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.youtube.com/iframe_api"></script>
  <style>
    body { font-family: system-ui, sans-serif; }
  </style>
</head>
<body class="bg-gray-100 min-h-screen">
  <div class="max-w-5xl mx-auto p-8">
    <h1 class="text-4xl font-bold text-center mb-2 text-indigo-700">MyDictation</h1>
    <p class="text-center text-gray-600 mb-8">Luyện Dictation TOEIC 440 • EN + VN</p>

    <div class="mb-8 bg-white p-6 rounded-3xl shadow">
      <input id="videoUrl" type="text" value="https://www.youtube.com/watch?v=7N0_qY9Jyzs" 
             class="w-full p-5 border rounded-2xl focus:outline-none focus:border-indigo-500 text-lg">
      <div class="flex gap-4 mt-4">
        <button onclick="loadVideo()" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-4 rounded-2xl text-lg">
          Tải Video & Transcript
        </button>
        <button onclick="manualTranscript()" class="flex-1 bg-gray-600 hover:bg-gray-700 text-white font-medium py-4 rounded-2xl text-lg">
          Nhập Transcript Thủ Công
        </button>
      </div>
    </div>

    <div id="playerContainer" class="hidden mb-8 aspect-video bg-black rounded-3xl overflow-hidden shadow-xl"></div>

    <div id="exerciseArea" class="hidden bg-white rounded-3xl shadow-xl p-8">
      <!-- Phần còn lại giữ nguyên như code trước -->
      <div class="flex justify-between items-center mb-6">
        <div class="flex items-center gap-4">
          <span id="sentenceNumber" class="font-mono text-lg font-semibold"></span>
          <select id="speed" onchange="changeSpeed()" class="border rounded-lg px-3 py-1">
            <option value="0.75">0.75x</option>
            <option value="1" selected>1x</option>
            <option value="1.25">1.25x</option>
            <option value="1.5">1.5x</option>
          </select>
        </div>
        <div class="flex gap-3">
          <button onclick="prevSentence()" class="px-6 py-3 bg-gray-200 hover:bg-gray-300 rounded-2xl">← Trước</button>
          <button onclick="nextSentence()" class="px-6 py-3 bg-gray-200 hover:bg-gray-300 rounded-2xl">Sau →</button>
        </div>
      </div>

      <textarea id="userInput" rows="4" class="w-full p-6 border-2 border-gray-300 focus:border-indigo-500 rounded-3xl text-lg resize-none" placeholder="Nghe và gõ lại câu tiếng Anh..."></textarea>

      <div class="flex gap-4 mt-6">
        <button onclick="checkAnswer()" class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white py-5 rounded-3xl font-semibold text-lg">Kiểm Tra</button>
        <button onclick="showAnswer()" class="flex-1 bg-amber-600 hover:bg-amber-700 text-white py-5 rounded-3xl font-semibold text-lg">Xem Đáp Án + Dịch VN</button>
        <button onclick="replayCurrent()" class="px-10 bg-gray-700 hover:bg-gray-800 text-white py-5 rounded-3xl">↻ Nghe Lại</button>
      </div>

      <div id="feedback" class="mt-8 min-h-[80px] text-lg"></div>
      
      <div id="answerArea" class="hidden mt-8 p-6 bg-amber-50 border border-amber-200 rounded-3xl">
        <p class="font-semibold mb-2">Câu gốc (English):</p>
        <p id="originalText" class="text-lg mb-6"></p>
        <p class="font-semibold mb-2">Dịch nghĩa Tiếng Việt (chỉnh được):</p>
        <textarea id="vietTranslation" rows="3" class="w-full p-4 border rounded-2xl"></textarea>
        <button onclick="saveTranslation()" class="mt-3 px-6 py-2 bg-indigo-600 text-white rounded-xl">Lưu Dịch Nghĩa</button>
      </div>
    </div>
  </div>

  <script>
    let player, videoId, sentences = [], currentIndex = 0, currentVideoKey = '';

    function extractVideoId(url) {
      const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
      const match = url.match(regExp);
      return (match && match[2].length === 11) ? match[2] : null;
    }

    async function loadVideo() {
      const url = document.getElementById('videoUrl').value.trim();
      videoId = extractVideoId(url);
      if (!videoId) return alert("Link YouTube không hợp lệ!");

      currentVideoKey = 'dictation_' + videoId;
      document.getElementById('playerContainer').classList.remove('hidden');
      document.getElementById('exerciseArea').classList.remove('hidden');

      if (player) player.destroy();

      player = new YT.Player('playerContainer', {
        width: '100%',
        height: '100%',
        videoId: videoId,
        playerVars: { autoplay: 0, controls: 1, rel: 0 },
        events: { onReady: onPlayerReady }
      });

      loadDemoTranscript(); // Video này có transcript tốt
    }

    function onPlayerReady() {
      console.log("✅ Player sẵn sàng");
    }

    function loadDemoTranscript() {
      sentences = [
        { text: "Hello everyone. Today I want to talk about something very important.", time: 7 },
        { text: "We are going to talk about how to practice English talking.", time: 14 },
        { text: "Many people study English for years.", time: 26 },
        { text: "They learn grammar rules. They memorize vocabulary lists.", time: 35 },
        { text: "But even after all that study, many people still feel nervous when they try to speak.", time: 48 },
        // Bạn có thể thêm nhiều câu hơn từ transcript thực tế
      ];
      currentIndex = 0;
      showCurrentSentence();
    }

    function manualTranscript() {
      const input = prompt("Dán transcript (mỗi câu một dòng):");
      if (!input) return;
      sentences = input.split('\n').filter(l => l.trim()).map((text, i) => ({ text: text.trim(), time: i * 5 }));
      currentIndex = 0;
      showCurrentSentence();
    }

    function showCurrentSentence() {
      document.getElementById('sentenceNumber').textContent = `Câu ${currentIndex + 1} / ${sentences.length}`;
      document.getElementById('userInput').value = '';
      document.getElementById('feedback').innerHTML = '';
      document.getElementById('answerArea').classList.add('hidden');
    }

    function checkAnswer() {
      const user = document.getElementById('userInput').value.trim();
      const correct = sentences[currentIndex].text;
      const feedback = document.getElementById('feedback');
      if (user.toLowerCase() === correct.toLowerCase()) {
        feedback.innerHTML = `<span class="text-emerald-600 font-bold">✅ Chính xác hoàn hảo!</span>`;
      } else {
        feedback.innerHTML = `<span class="text-amber-600">⚠️ Chưa chính xác. Xem đáp án.</span>`;
      }
    }

    function showAnswer() {
      const area = document.getElementById('answerArea');
      document.getElementById('originalText').textContent = sentences[currentIndex].text;
      area.classList.remove('hidden');
      const saved = localStorage.getItem(currentVideoKey + '_trans_' + currentIndex);
      if (saved) document.getElementById('vietTranslation').value = saved;
    }

    function saveTranslation() {
      const trans = document.getElementById('vietTranslation').value.trim();
      localStorage.setItem(currentVideoKey + '_trans_' + currentIndex, trans);
      alert("✅ Đã lưu bản dịch!");
    }

    function replayCurrent() {
      if (player && sentences[currentIndex]) {
        player.seekTo(sentences[currentIndex].time || 0);
        player.playVideo();
      }
    }

    function changeSpeed() {
      if (player) player.setPlaybackRate(parseFloat(document.getElementById('speed').value));
    }

    function nextSentence() { if (currentIndex < sentences.length - 1) { currentIndex++; showCurrentSentence(); } }
    function prevSentence() { if (currentIndex > 0) { currentIndex--; showCurrentSentence(); } }

    window.onYouTubeIframeAPIReady = () => console.log("YouTube API loaded");
  </script>
</body>
</html>
